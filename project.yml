name: GTAFreeSTEM
options:
  bundleIdPrefix: com.rupayonhaldar
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: "NO"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    LOCALIZATION_PREFERS_STRING_CATALOGS: "YES"
    SWIFT_VERSION: "6.0"
    STRING_CATALOG_GENERATE_SYMBOLS: "YES"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
  configs:
    Debug:
      ENABLE_TESTABILITY: "YES"
      GCC_OPTIMIZATION_LEVEL: "0"
      ONLY_ACTIVE_ARCH: "YES"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      ENABLE_NS_ASSERTIONS: "NO"
      SWIFT_COMPILATION_MODE: wholemodule
      SWIFT_OPTIMIZATION_LEVEL: "-O"
targets:
  GTAFreeSTEM:
    type: application
    platform: iOS
    sources:
      - GTAFreeSTEM
    resources:
      - GTAFreeSTEM/Assets.xcassets
      - GTAFreeSTEM/Resources
    info:
      path: GTAFreeSTEM/Info.plist
      properties:
        CFBundleDisplayName: GTA FREE STEM
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleURLTypes:
          - CFBundleURLName: com.rupayonhaldar.gtafreestem
            CFBundleURLSchemes:
              - gtafreestem
        ITSAppUsesNonExemptEncryption: false
        BGTaskSchedulerPermittedIdentifiers:
          - com.rupayonhaldar.gtafreestem.hunt.refresh
        NSLocationWhenInUseUsageDescription: GTA FREE STEM can use your location only while browsing to find nearby free opportunities.
        UIBackgroundModes:
          - fetch
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_NAME: GTAFreeSTEM
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: iPhone Developer
        PRODUCT_BUNDLE_IDENTIFIER: com.rupayonhaldar.gtafreestem
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: FE33NM88XX
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: false
  GTAFreeSTEMTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - GTAFreeSTEMTests
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@loader_path/Frameworks"
        PRODUCT_NAME: GTAFreeSTEMTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GTAFreeSTEM.app/GTAFreeSTEM"
    info:
      path: GTAFreeSTEMTests/Info.plist
      properties:
        CFBundleDisplayName: GTA FREE STEM Tests
    dependencies:
      - target: GTAFreeSTEM
schemes:
  GTAFreeSTEM:
    build:
      targets:
        GTAFreeSTEM: all
    run:
      config: Debug
    test:
      config: Debug
      debugEnabled: false
      targets:
        - GTAFreeSTEMTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
